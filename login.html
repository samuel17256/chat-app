<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GistMe</title>
    <link rel="stylesheet" href="./src/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap"
        rel="stylesheet" />
</head>
<body class="font-mono-custom">
     <div class="flex min-h-screen">
        <div class="relative hidden lg:block w-1/2">
            <img src="./src/public/an-african-american-woman-with-a-contagious-smile-interacts-with-her-smartphone.webp"
                alt="bg-image" class="w-full h-full object-cover" />
            <div class="absolute inset-0 bg-black/80"></div>
            <div class="absolute inset-0 flex flex-col justify-between py-4 items-center">
                <a href="index.html" class="no-underline">
                    <h1 class="text-white text-4xl font-bold">Gist<span class="text-[#cc830e]">Me</span></h1>
                </a>
                <p class="text-white text-base opacity-80 max-w-xs">
                    Real conversations, real people, just you and your people, anytime.
                </p>
            </div>
        </div>

        <div class="w-full lg:w-1/2 flex items-center justify-center px-8 py-16 bg-white">
            <div class="w-full max-w-md flex flex-col gap-8">

                <div class="flex flex-col gap-2">
                    <a href="index.html" class="no-underline lg:hidden">
                        <h1 class="font-bold text-2xl text-[#201f1e]">Gist<span class="text-[#65430c]">Me</span></h1>
                    </a>
                    <h2 class="text-3xl font-bold text-[#201f1e]">Log in to your account</h2>
                    <p class="text-[#878785] text-sm">Welcome back! Please enter your details.</p>
                </div>

                <form class="flex flex-col gap-5">

                    <div class="flex flex-col gap-1.5">
                        <label for="email" class="text-sm text-[#232322] font-medium">Email</label>
                        <input type="email" id="email" name="email" required placeholder="e.g. samuel_nan@example.com"
                            class="border border-[#878785] rounded-lg px-4 py-2.5 text-sm outline-none focus:border-[#9e6915] focus:ring-1 focus:ring-[#9e6915] transition-all duration-200 placeholder:text-[#b0afad]" />
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label for="password" class="text-sm text-[#232322] font-medium">Password</label>
                       <div class="flex justify-between items-center border border-[#878785] rounded-lg px-4 py-2 focus-within:border-[#9e6915] focus-within:ring-1 focus-within:ring-[#9e6915] transition-all duration-200">
                         <input type="password" id="password" name="password" required placeholder="Min. 8 characters"
                            class="border-0 rounded-lg text-sm outline-none focus:border-[#9e6915] transition-all duration-200 placeholder:text-[#b0afad]" />
                            <button class="text-sm text-[#9e6915] hover:text-[#cc830e] transition-colors duration-200 border-0" id="togglePasswordVisibility">
                                Show
                            </button>
                       </div>
                    </div>

                    <button
                        class="w-full py-2.5 bg-[#9e6915] rounded-lg text-white font-medium cursor-pointer hover:bg-[#cc830e] transition-colors duration-200 mt-2" id="loginBtn">
                        Log In
                    </button>
                </form>

                <div class="flex items-center gap-3">
                    <div class="flex-1 h-px bg-[#e0dfdd]"></div>
                    <span class="text-xs text-[#878785]">Don't have an account?</span>
                    <div class="flex-1 h-px bg-[#e0dfdd]"></div>
                </div>

                <button onclick="window.location.href='register.html'"
                    class="w-full py-2.5 border border-[#878785] rounded-lg text-[#232322] font-medium cursor-pointer hover:bg-[#cc830e] hover:text-white hover:border-[#cc830e] transition-colors duration-200">
                    Create Account
                </button>

            </div>
        </div>

    </div>

    <script src="./js/login.js"></script>
</body>
</html>
