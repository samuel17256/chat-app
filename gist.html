<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GistMe - Chats</title>
    <link rel="stylesheet" href="./src/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
</head>
<body class="font-mono-custom bg-[#faf9f7] h-dvh flex justify-center">

    <div class="flex flex-col w-full max-w-md h-dvh bg-white border-x border-gray-200">

        <!-- Header -->
        <header class="flex items-center justify-between px-5 py-4 border-b border-gray-200 bg-white sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <span class="text-2xl text-[#9e6915] font-bold">GistMe</span>
            </div>
            <div id="profileAvatar"
                class="w-10 h-10 rounded-full bg-[#9e6915] text-white text-sm font-medium flex items-center justify-center cursor-pointer border-2 border-brand-light hover:ring-4 hover:ring-brand-light transition-all duration-200 select-none uppercase">
              
            </div>
                <button id="logoutBtn" class="text-sm text-[#9e6915] hover:text-[#cc830e] transition-colors duration-200 border-0">
                    Logout
                </button>
        </header>

        <!-- Chat Container -->
        <div id="chatContainer" class="flex-1 overflow-y-auto px-4 py-5 flex flex-col gap-1 scroll-smooth">

            <!-- Date divider -->
            <div class="flex items-center gap-3 my-3">
                <div class="flex-1 h-px bg-gray-200"></div>
                <span class="text-[10px] text-gray-400 uppercase tracking-widest">Today</span>
                <div class="flex-1 h-px bg-gray-200"></div>
            </div>
            <div id="chatCard" class="flex flex-col gap-1">

            </div>
        </div>

        <div class="px-4 pb-6 pt-3 border-t border-gray-200 bg-white">
            <div class="flex items-center gap-3 bg-[#faf9f7] border border-gray-200 rounded-full px-4 py-1.5 transition-all duration-200 focus-within:border-gray-400 focus-within:ring-4 focus-within:ring-gray-200">
                <input
                    type="text"
                    id="yourChats"
                    placeholder="Type your message…"
                    autocomplete="off"
                    class="flex-1 bg-transparent outline-none text-xs text-gray-800 placeholder:text-gray-400 font-mono-custom py-1.5"
                />
                <button id="sendBtn"
                    class="w-9 h-9 rounded-full bg-[#9e6915] hover:bg-[#7a500f] active:scale-95 flex items-center justify-center shrink-0 transition-all duration-150">
                    <svg class="w-4 h-4 fill-white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>

    </div>


    <script src="/socket.io/socket.io.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
